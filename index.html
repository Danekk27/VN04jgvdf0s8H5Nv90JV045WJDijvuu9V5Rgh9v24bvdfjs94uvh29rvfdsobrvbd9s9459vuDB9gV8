<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AI Chat</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;}

/* ── BG ── */
.bg{position:fixed;inset:0;z-index:0;background:#141414;}
.bokeh{position:absolute;border-radius:50%;pointer-events:none;z-index:1;}
.bg-text{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);font-size:110px;letter-spacing:.22em;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,0.055);pointer-events:none;user-select:none;white-space:nowrap;font-family:'Bebas Neue',sans-serif;}
.bk1{width:500px;height:500px;background:radial-gradient(circle,rgba(141,170,246,1) 0%,rgba(100,140,230,0.8) 30%,rgba(50,90,190,0.35) 60%,transparent 72%);filter:blur(70px);left:-170px;top:-175px;}

/* ── APP ── */
.app{position:relative;z-index:2;display:flex;flex-direction:column;height:100svh;height:100vh;overflow:hidden;}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 14px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.06);}
.logo{display:flex;align-items:center;gap:8px;}
.logo-text{font-size:18px;font-weight:600;color:#fff;letter-spacing:.02em;}
.header-right{display:flex;align-items:center;gap:10px;}
.hbtn{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(200,215,245,0.4);transition:all .2s;}
.hbtn:active{background:rgba(255,255,255,0.1);color:rgba(200,215,245,0.8)}
.hbtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── CONTENT AREA ── */
.content-area{flex:1;min-height:0;overflow-y:auto;scrollbar-width:none;display:flex;flex-direction:column;}
.content-area::-webkit-scrollbar{display:none}

/* ── MODEL PICKER ── */
.model-section{
  min-height:100%;
  display:flex;flex-direction:column;
  align-items:center;
  padding:0 16px;text-align:center;width:100%;
  flex-shrink:0;
}
#spacer,#spacer2{flex:1;width:100%;}
.empty-icon{width:80px;height:80px;border-radius:22px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;color:rgba(141,170,246,0.65);margin-bottom:6px;}
.empty-icon svg{width:36px;height:36px;stroke:currentColor;fill:none;stroke-width:1.5;}
.model-section h3{font-size:17px;font-weight:600;color:rgba(230,238,255,0.75);margin-bottom:4px;}
.model-section p{font-size:13px;color:rgba(180,200,235,0.32);margin-bottom:18px;}
.model-picker{display:flex;flex-direction:row;gap:8px;width:100%;}
.model-card{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;background:#1e1e1e;border:1.5px solid rgba(255,255,255,0.07);border-radius:12px;cursor:pointer;transition:all .2s;text-align:center;}
.model-card:active{transform:scale(.96)}
.model-card.selected{border:1.5px solid transparent;background:linear-gradient(#1e1e1e,#1e1e1e) padding-box,linear-gradient(to right,rgba(45,116,232,0.5),rgba(175,231,255,0.4),rgba(111,162,254,0.5)) border-box;}
.model-name{font-size:13px;font-weight:600;color:rgba(200,215,250,0.45);transition:color .2s;}
.model-card.selected .model-name{color:rgba(220,232,255,0.92);}
.model-desc{font-size:10.5px;color:rgba(160,185,230,0.25);line-height:1.3;transition:color .2s;}
.model-card.selected .model-desc{color:rgba(180,205,240,0.45);}

/* ── MESSAGES ── */
.messages{padding:22px 0 8px;width:100%;display:flex;flex-direction:column;gap:12px;}
.messages::-webkit-scrollbar{display:none}

/* empty hint */
.empty-hint{flex:1;display:flex;align-items:center;justify-content:center;}
.empty-hint p{font-size:13px;color:rgba(180,200,235,0.2);text-align:center;line-height:1.55;}

/* msg row */
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:fadein .22s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg-row.user{flex-direction:row-reverse}
.msg-col{display:flex;flex-direction:column;max-width:78%}
.msg-row.user .msg-col{align-items:flex-end}
.bubble{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.52;word-break:break-word;white-space:pre-wrap;}
.bubble.ai{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-bottom-left-radius:4px;color:rgba(225,235,252,0.88);}
.bubble.user{background:#6c9cfa;border:none;border-bottom-right-radius:4px;color:#fff;}
.msg-time{font-size:10px;color:rgba(160,185,225,0.28);margin-top:4px;padding:0 2px;}

/* typing */
.typing-row{display:flex;align-items:flex-end;gap:8px}
.typing-bubble{padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:18px;border-bottom-left-radius:4px;display:flex;gap:5px;align-items:center;}
.td{width:6px;height:6px;border-radius:50%;background:rgba(141,170,246,0.6);animation:tdot 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.18s}.td:nth-child(3){animation-delay:.36s}
@keyframes tdot{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-5px);opacity:1}}

/* ── INPUT ── */
.input-area{padding:6px 14px 10px;flex-shrink:0;}
.input-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:10px 10px 10px 16px;transition:border-color .2s,box-shadow .2s;}
.input-row:focus-within{border-color:rgba(141,170,246,0.3);box-shadow:0 0 0 3px rgba(141,170,246,0.06);}
textarea{flex:1;background:transparent;border:none;outline:none;color:rgba(220,232,255,0.88);font-size:14px;font-family:inherit;line-height:1.45;resize:none;min-height:20px;max-height:100px;height:20px;overflow-y:auto;scrollbar-width:none;}
textarea::placeholder{color:rgba(160,185,230,0.28)}
textarea::-webkit-scrollbar{display:none}
.send-btn{width:36px;height:36px;border-radius:11px;background:linear-gradient(to right,#2d74e8,#afe7ff,#6fa2fe);border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px 4px rgba(111,162,254,0.35),0 0 30px 6px rgba(45,116,232,0.2);transition:all .18s;}
.send-btn:active{transform:scale(.88)}
.send-btn:disabled{cursor:default;}
.send-btn svg{width:16px;height:16px;stroke:#000;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>

<div class="bg"><div class="bokeh bk1"></div><div class="bg-text">Basic</div></div>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="12" y1="22.08" x2="12" y2="12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-text">AI Chat</span>
    </div>
    <div class="header-right">
      <div class="hbtn" onclick="clearChat()" title="New chat">
        <svg viewBox="0 0 24 24"><path d="M12 5H5a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
      <div class="hbtn">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </div>
    </div>
  </div>

  <div class="content-area">
    <div class="model-section" id="modelSection">
      <div id="spacer"></div>
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      </div>
      <h3>Start a conversation</h3>
      <p>Choose a mode below</p>
      <div class="model-picker">
        <div class="model-card" onclick="selectModel(this,'normal')">
          <div class="model-name">Normal</div>
          <div class="model-desc">Fast replies</div>
        </div>
        <div class="model-card selected" onclick="selectModel(this,'smart')">
          <div class="model-name">Smart</div>
          <div class="model-desc">Accurate & detailed</div>
        </div>
        <div class="model-card" onclick="selectModel(this,'best')">
          <div class="model-name">Smart+</div>
          <div class="model-desc">Deep reasoning</div>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div id="spacer2"></div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Write a message..." oninput="onInput()" onkeydown="onKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>
        <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

let busy=false,currentModel='smart',chatStarted=false;
const messagesEl=document.getElementById('messages');
const inputEl=document.getElementById('input');
const sendBtnEl=document.getElementById('sendBtn');
const modelSectionEl=document.getElementById('modelSection');
const spacerEl=document.getElementById('spacer');
const spacer2El=document.getElementById('spacer2');

function selectModel(el,model){
  document.querySelectorAll('.model-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected'); currentModel=model;
  tg?.HapticFeedback?.selectionChanged();
}

function time(){
  const d=new Date();let h=d.getHours();
  const m=d.getMinutes().toString().padStart(2,'0');
  const ap=h>=12?'PM':'AM';h=h%12||12;
  return h+':'+m+' '+ap;
}

const contentAreaEl=document.querySelector('.content-area');
function scroll(){setTimeout(()=>{if(contentAreaEl)contentAreaEl.scrollTop=contentAreaEl.scrollHeight;},40);}

function appendMsg(role,text){
  if(!chatStarted){
    chatStarted=true;
    const h=spacerEl?spacerEl.offsetHeight:0;
    if(spacerEl)spacerEl.style.flex='0 0 '+h+'px';
    if(spacer2El)spacer2El.style.flex='0 0 0';
  }
  const row=document.createElement('div');row.className='msg-row '+(role==='user'?'user':'ai');
  const col=document.createElement('div');col.className='msg-col';
  const bubble=document.createElement('div');bubble.className='bubble '+(role==='user'?'user':'ai');
  bubble.textContent=text;
  const t=document.createElement('div');t.className='msg-time';t.textContent=time();
  col.appendChild(bubble);col.appendChild(t);row.appendChild(col);
  messagesEl.appendChild(row);scroll();
}

function showTyping(){
  const row=document.createElement('div');row.className='typing-row';row.id='typing';
  const b=document.createElement('div');b.className='typing-bubble';
  for(let i=0;i<3;i++){const d=document.createElement('div');d.className='td';b.appendChild(d);}
  row.appendChild(b);messagesEl.appendChild(row);scroll();
}
function hideTyping(){const r=document.getElementById('typing');if(r)r.remove();}

const replyFns=[
  t=>/neural|network|нейрон/i.test(t)&&'A neural network is a mathematical model inspired by the brain. Layers of nodes receive inputs, multiply by weights, and pass results forward. Weights adjust during training to minimize error.',
  t=>/python|sort|bubble|код/i.test(t)&&'def bubble_sort(arr):\n    n=len(arr)\n    for i in range(n):\n        for j in range(0,n-i-1):\n            if arr[j]>arr[j+1]:\n                arr[j],arr[j+1]=arr[j+1],arr[j]\n    return arr',
  t=>/translat|english|перевод/i.test(t)&&'"Dobryy den" translates to "Good afternoon" or "Hello". Want to translate something else?',
  t=>/startup|idea|стартап/i.test(t)&&'5 startup ideas:\n\n1. AI assistant for freelancers\n2. Anonymous dev mentorship\n3. Health monitoring via wearables\n4. Local services with AI matching\n5. Automated A/B content testing',
];
const delays={normal:400,smart:800,best:1400};
function getReply(text){
  return 'This is package basic, buy it soon and enjoy working!';
}

async function send(){
  const text=inputEl.value.trim();
  if(!text||busy)return;
  busy=true;
  appendMsg('user',text);
  inputEl.value='';inputEl.style.height='20px';sendBtnEl.disabled=true;
  showTyping();
  await new Promise(r=>setTimeout(r,(delays[currentModel]||800)+Math.random()*600));
  hideTyping();appendMsg('ai',getReply(text));
  busy=false;toggleSend();
  tg?.HapticFeedback?.impactOccurred('light');
}

function onInput(){inputEl.style.height='20px';inputEl.style.height=Math.min(inputEl.scrollHeight,100)+'px';toggleSend();}
function toggleSend(){sendBtnEl.disabled=!inputEl.value.trim()||busy;}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!sendBtnEl.disabled)send();}}

function clearChat(){
  messagesEl.querySelectorAll('.msg-row,.typing-row').forEach(r=>r.remove());
  modelSectionEl.style.display='';
  chatStarted=false;
  if(spacerEl)spacerEl.style.flex='1';
  if(spacer2El)spacer2El.style.flex='1';
  busy=false;toggleSend();
  tg?.HapticFeedback?.impactOccurred('medium');
}
</script>
</body>
</html>
