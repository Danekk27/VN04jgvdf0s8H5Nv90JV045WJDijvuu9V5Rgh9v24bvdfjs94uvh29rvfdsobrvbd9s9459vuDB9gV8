<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AI Chat</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  width:100%;height:100%;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── BACKGROUND ── */
.bg{
  position:fixed;inset:0;z-index:0;
  background:#141414;
}
.bokeh{
  position:absolute;border-radius:50%;
  pointer-events:none;z-index:1;
}
.bk1{
  width:700px;height:700px;
  background:radial-gradient(circle, rgba(141,170,246,1) 0%, rgba(100,140,230,0.8) 30%, rgba(50,90,190,0.35) 60%, transparent 72%);
  filter:blur(90px);
  left:-200px;top:-220px;
}

/* ── APP ── */
.app{
  position:relative;z-index:2;
  display:flex;flex-direction:column;
  height:100svh;height:100vh;
  overflow:hidden;
}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;gap:12px;
  padding:18px 20px 14px;
  flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.ai-avatar{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,#4a8fff,#1f5bef);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.ai-avatar svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ai-info{flex:1}
.ai-name{font-size:15px;font-weight:600;color:#fff;}
.ai-status{
  display:flex;align-items:center;gap:5px;
  margin-top:2px;
}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:#4ade80;
  box-shadow:0 0 6px rgba(74,222,128,0.6);
}
.status-text{font-size:11.5px;color:rgba(200,215,245,0.45);}
.header-btn{
  width:34px;height:34px;border-radius:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(200,215,245,0.4);
  transition:all .2s;
}
.header-btn:active{background:rgba(255,255,255,0.1);color:rgba(200,215,245,0.8)}
.header-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── MESSAGES ── */
.messages{
  flex:1;min-height:0;
  overflow-y:auto;scrollbar-width:none;
  padding:18px 16px 10px;
  display:flex;flex-direction:column;
  gap:12px;
}
.messages::-webkit-scrollbar{display:none}

/* empty state */
.empty{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;text-align:center;
  padding:30px 20px;
}
.empty-icon{
  width:54px;height:54px;border-radius:16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;justify-content:center;
  color:rgba(141,170,246,0.6);
  margin-bottom:6px;
}
.empty-icon svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.5}
.empty h3{font-size:16px;font-weight:600;color:rgba(230,238,255,0.7);}
.empty p{font-size:13px;color:rgba(180,200,235,0.35);line-height:1.55;max-width:210px;}

/* message row */
.msg-row{
  display:flex;align-items:flex-end;gap:8px;
  animation:fadein .22s ease;
}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg-row.user{flex-direction:row-reverse}

.msg-col{display:flex;flex-direction:column;max-width:78%}
.msg-row.user .msg-col{align-items:flex-end}

.bubble{
  padding:10px 14px;
  border-radius:18px;
  font-size:14px;line-height:1.52;
  word-break:break-word;white-space:pre-wrap;
}
.bubble.ai{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-bottom-left-radius:4px;
  color:rgba(225,235,252,0.88);
}
.bubble.user{
  background:linear-gradient(135deg,rgba(74,143,255,0.22),rgba(31,91,239,0.16));
  border:1px solid rgba(100,160,255,0.2);
  border-bottom-right-radius:4px;
  color:rgba(220,232,255,0.92);
}
.msg-time{
  font-size:10px;color:rgba(160,185,225,0.28);
  margin-top:4px;padding:0 2px;
}

/* typing */
.typing-row{display:flex;align-items:flex-end;gap:8px}
.typing-bubble{
  padding:12px 16px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;border-bottom-left-radius:4px;
  display:flex;gap:5px;align-items:center;
}
.td{width:6px;height:6px;border-radius:50%;background:rgba(141,170,246,0.6);animation:tdot 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.18s}
.td:nth-child(3){animation-delay:.36s}
@keyframes tdot{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-5px);opacity:1}}

/* ── SUGGESTIONS ── */
.suggestions{
  padding:0 16px 12px;
  display:grid;grid-template-columns:1fr 1fr;
  gap:7px;flex-shrink:0;
}
.sg{
  padding:10px 12px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:13px;cursor:pointer;
  transition:all .18s;
}
.sg:active{background:rgba(141,170,246,0.1);border-color:rgba(141,170,246,0.25);transform:scale(.97)}
.sg-text{font-size:12px;color:rgba(180,205,240,0.5);line-height:1.4;}

/* ── INPUT ── */
.input-area{
  padding:8px 14px 18px;
  flex-shrink:0;
}
.input-row{
  display:flex;align-items:flex-end;gap:8px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:10px 10px 10px 16px;
  transition:border-color .2s,box-shadow .2s;
}
.input-row:focus-within{
  border-color:rgba(141,170,246,0.3);
  box-shadow:0 0 0 3px rgba(141,170,246,0.06);
}
textarea{
  flex:1;background:transparent;border:none;outline:none;
  color:rgba(220,232,255,0.88);
  font-size:14px;font-family:inherit;
  line-height:1.45;resize:none;
  min-height:20px;max-height:100px;height:20px;
  overflow-y:auto;scrollbar-width:none;
}
textarea::placeholder{color:rgba(160,185,230,0.28)}
textarea::-webkit-scrollbar{display:none}

.send-btn{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#4a8fff,#1f5bef);
  border:none;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px rgba(74,143,255,0.35);
  transition:all .18s;
}
.send-btn:active{transform:scale(.88)}
.send-btn:disabled{
  background:rgba(255,255,255,0.07);
  box-shadow:none;cursor:default;
}
.send-btn svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transform:translateX(1px)}
</style>
</head>
<body>

<div class="bg">
  <div class="bokeh bk1"></div>
</div>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="ai-avatar">
      <svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 012 2v1a2 2 0 01-2 2 2 2 0 01-2-2V4a2 2 0 012-2z"/><path d="M12 7v10M8 9l4-2 4 2M8 15l4 2 4-2"/><rect x="3" y="9" width="4" height="6" rx="1"/><rect x="17" y="9" width="4" height="6" rx="1"/></svg>
    </div>
    <div class="ai-info">
      <div class="ai-name">AI Assistant</div>
      <div class="ai-status">
        <div class="status-dot"></div>
        <span class="status-text">Online</span>
      </div>
    </div>
    <div class="header-btn" onclick="clearChat()">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      </div>
      <h3>Start a conversation</h3>
      <p>Ask anything or pick one of the suggestions below</p>
    </div>
  </div>

  <!-- Suggestions -->
  <div class="suggestions" id="suggestions">
    <div class="sg" onclick="suggest('Explain what a neural network is')">
      <div class="sg-text">Explain neural networks</div>
    </div>
    <div class="sg" onclick="suggest('Write bubble sort in Python')">
      <div class="sg-text">Python code example</div>
    </div>
    <div class="sg" onclick="suggest('Give me 5 startup ideas')">
      <div class="sg-text">Startup ideas</div>
    </div>
    <div class="sg" onclick="suggest('Translate to English: Dobryy den')">
      <div class="sg-text">Translate text</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="input"
        placeholder="Write a message..."
        oninput="onInput()"
        onkeydown="onKey(event)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

let busy = false;
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('input');
const sendBtnEl  = document.getElementById('sendBtn');
const emptyEl    = document.getElementById('emptyState');
const suggestEl  = document.getElementById('suggestions');

function time(){
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function hideEmpty(){
  if(!emptyEl) return;
  emptyEl.style.display = 'none';
  suggestEl.style.display = 'none';
}

function scroll(){
  setTimeout(() => messagesEl.scrollTop = messagesEl.scrollHeight, 40);
}

function appendMsg(role, text){
  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : 'ai');
  const col = document.createElement('div');
  col.className = 'msg-col';
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (role === 'user' ? 'user' : 'ai');
  bubble.textContent = text;
  const t = document.createElement('div');
  t.className = 'msg-time';
  t.textContent = time();
  col.appendChild(bubble);
  col.appendChild(t);
  row.appendChild(col);
  messagesEl.appendChild(row);
  scroll();
}

function showTyping(){
  const row = document.createElement('div');
  row.className = 'typing-row'; row.id = 'typing';
  const b = document.createElement('div'); b.className = 'typing-bubble';
  for(let i = 0; i < 3; i++){const d = document.createElement('div'); d.className = 'td'; b.appendChild(d);}
  row.appendChild(b);
  messagesEl.appendChild(row);
  scroll();
}
function hideTyping(){const r = document.getElementById('typing'); if(r) r.remove();}

const replies = [
  t => /neural|network|ai|intelligence/i.test(t) &&
    'A neural network is a mathematical model inspired by the brain. It consists of layers of nodes (neurons) that receive inputs, multiply them by weights, and pass the result forward. During training the weights are adjusted to minimize prediction error.',
  t => /python|code|sort|bubble/i.test(t) &&
    'def bubble_sort(arr):\n    n = len(arr)\n    for i in range(n):\n        for j in range(0, n-i-1):\n            if arr[j] > arr[j+1]:\n                arr[j], arr[j+1] = arr[j+1], arr[j]\n    return arr\n\nExample: bubble_sort([64, 34, 25]) returns [25, 34, 64].',
  t => /translat|english|dobr/i.test(t) &&
    '"Dobryy den" translates to "Good afternoon" or simply "Hello". Want to translate something else?',
  t => /startup|idea/i.test(t) &&
    '5 startup ideas:\n\n1. AI assistant for freelancers to automate routine tasks\n2. Anonymous mentorship platform for developers\n3. Health monitoring service via wearables\n4. Local services marketplace with AI matching\n5. A/B content testing and generation tool',
];

function getReply(text){
  for(const fn of replies){const r = fn(text); if(r) return r;}
  const g = [
    'Understood. Let me think through that in more detail — where would you like to start?',
    'Good question. It depends on the context. Could you clarify the conditions?',
    'There are a few approaches here. Are you more interested in theory or practical application?',
    'Got it. I can give you a detailed or a short answer — which do you prefer?',
    'Interesting question. To give a precise answer, what exactly do you need as output?',
  ];
  return g[Math.floor(Math.random() * g.length)];
}

async function send(){
  const text = inputEl.value.trim();
  if(!text || busy) return;
  busy = true;
  hideEmpty();
  appendMsg('user', text);
  inputEl.value = '';
  inputEl.style.height = '20px';
  sendBtnEl.disabled = true;
  showTyping();
  await new Promise(r => setTimeout(r, 700 + Math.random() * 800));
  hideTyping();
  appendMsg('ai', getReply(text));
  busy = false;
  toggleSend();
  tg?.HapticFeedback?.impactOccurred('light');
}

function suggest(text){
  inputEl.value = text;
  onInput();
  send();
}

function onInput(){
  inputEl.style.height = '20px';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  toggleSend();
}

function toggleSend(){
  sendBtnEl.disabled = !inputEl.value.trim() || busy;
}

function onKey(e){
  if(e.key === 'Enter' && !e.shiftKey){e.preventDefault(); if(!sendBtnEl.disabled) send();}
}

function clearChat(){
  messagesEl.querySelectorAll('.msg-row,.typing-row').forEach(r => r.remove());
  emptyEl.style.display = '';
  suggestEl.style.display = '';
  busy = false;
  toggleSend();
  tg?.HapticFeedback?.impactOccurred('medium');
}
</script>
</body>
</html>
